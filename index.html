<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turtledevv's Minecraft Role Creator</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
  <link rel="stylesheet" href="/assets/css/liquidy-ass.css">
  <script src="/assets/js/app.js" defer></script>
</head>

<body>
  <main class="glass">
    <header>
      <h2>Turtledevv's MC Role Creator :3</h2>
      <hr>
    </header>

    <div id="controls">
      <div class="slider-container">
        <label for="widthSlider">Width</label>
        <input type="range" id="widthSlider" min="1" max="500" value="40">
        <span id="widthLabel">40</span>
      </div>

      <!-- GRADIENT STOPS -->
      <div class="section-label">Gradient Colors</div>
      <div id="gradientStops"></div>
      <div class="options">
        <button id="addStopBtn">+ Add Color</button>
        <button id="removeStopBtn">− Remove Color</button>
      </div>

      <!-- GRADIENT TYPE -->
      <div class="options">
        <label for="gradientType">Gradient Type</label>
        <select id="gradientType">
          <option value="linear-h">Linear (Horizontal)</option>
          <option value="linear-v">Linear (Vertical)</option>
          <option value="linear-d">Linear (Diagonal ↘)</option>
          <option value="linear-d2">Linear (Diagonal ↗)</option>
          <option value="radial">Radial</option>
        </select>
      </div>

      <!-- BLEND MODE -->
      <div class="options">
        <label for="blendMode">Blend Mode</label>
        <select id="blendMode">
          <option value="smooth">Smooth</option>
          <option value="steps">Hard Cuts</option>
        </select>
      </div>

      <!-- TEXT COLOR -->
      <div class="options">
        <label for="textColorMode">Text Color</label>
        <select id="textColorMode">
          <option value="white">White</option>
          <option value="black">Black</option>
          <option value="custom">Custom</option>
        </select>
        <input type="color" id="textColor" value="#ffffff" style="display:none;">
      </div>

      <div class="options">
        <label for="overlayText">Text</label>
        <input type="text" id="overlayText" value="HELLO">
      </div>

      <div class="options">
        <label>
          <input type="checkbox" id="roundedCorners">
          Rounded Corners
        </label>
      </div>

      <div class="options">
        <label>
          <input type="checkbox" id="autoWidth" checked>
          Auto Width
        </label>
      </div>

      <div class="options">
        <label for="borderMode">Border Mode</label>
        <select id="borderMode">
          <option value="auto">Auto</option>
          <option value="overlay">Manual (Brightness)</option>
          <option value="manual">Manual (Color)</option>
        </select>
      </div>

      <div class="options" id="overlayControls" style="display:none;">
        <label for="borderBrightness">Brightness</label>
        <input type="range" id="borderBrightness" min="0" max="2" step="0.05" value="0.5">
        <span id="borderBrightnessLabel">0.5</span>
      </div>

      <div class="options" id="manualBorderControls" style="display:none;">
        <label>Border 1</label>
        <input type="color" id="borderColor1" value="#000000">
        <label>Border 2</label>
        <input type="color" id="borderColor2" value="#000000">
      </div>

      <div class="options">
        <button id="download">Download PNG</button>
        <button id="shareBtn">Copy Link</button>
      </div>
    </div>

    <div id="canvasContainer">
      <canvas id="canvas" width="40" height="9"></canvas>
    </div>
  </main>

  <footer>
    NOT AN OFFICIAL MINECRAFT PRODUCT. NOT APPROVED BY OR ASSOCIATED WITH MOJANG OR MICROSOFT.<br>
    MADE BY TRTLDEV, WITH LOVE, I GUESS &lt;3
  </footer>
</body>
</html>
