<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turtledevv's Minecraft Role Creator</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
  <link rel="stylesheet" href="/assets/css/liquidy-ass.css">
  <script src="/assets/js/app.js" defer></script>
</head>

<body>
  <main class="glass">
    <header>
      <h2>Turtledevv's MC Role Creator :3</h2>
      <hr>
    </header>

    <div id="controls">

      <!-- PREVIEW -->
      <div id="canvasContainer">
        <canvas id="canvas" width="40" height="9"></canvas>
      </div>

      <!-- SECTION: Gradient -->
      <div class="control-section">
        <div class="section-label">Gradient</div>

        <div class="field-row">
          <label for="gradientType">Type</label>
          <select id="gradientType">
            <option value="linear-h">Linear →</option>
            <option value="linear-v">Linear ↓</option>
            <option value="linear-d">Linear ↘</option>
            <option value="linear-d2">Linear ↗</option>
            <option value="radial">Radial</option>
          </select>
          <label for="blendMode">Blend</label>
          <select id="blendMode">
            <option value="smooth">Smooth</option>
            <option value="steps">Hard Cuts</option>
          </select>
        </div>

        <div class="section-sublabel">Colors &amp; Positions</div>
        <div id="gradientStops"></div>
        <div class="field-row btn-row">
          <button id="addStopBtn">+ Add Color</button>
          <button id="removeStopBtn">− Remove Color</button>
        </div>
      </div>

      <!-- SECTION: Text -->
      <div class="control-section">
        <div class="section-label">Text</div>

        <div class="field-row">
          <label for="overlayText">Content</label>
          <input type="text" id="overlayText" value="HELLO">
        </div>

        <div class="field-row">
          <label for="textColorMode">Color</label>
          <select id="textColorMode">
            <option value="white">White</option>
            <option value="black">Black</option>
            <option value="custom">Custom</option>
          </select>
          <input type="color" id="textColor" value="#ffffff" style="display:none;">
        </div>
      </div>

      <!-- SECTION: Size & Shape -->
      <div class="control-section">
        <div class="section-label">Size &amp; Shape</div>

        <div class="field-row">
          <label for="widthSlider">Width</label>
          <input type="range" id="widthSlider" min="1" max="500" value="40">
          <span id="widthLabel" class="value-badge">40</span>
        </div>

        <div class="field-row checkbox-row">
          <label class="check-label">
            <input type="checkbox" id="autoWidth" checked>
            Auto Width
          </label>
          <label class="check-label">
            <input type="checkbox" id="roundedCorners">
            Rounded Corners
          </label>
        </div>
      </div>

      <!-- SECTION: Border -->
      <div class="control-section">
        <div class="section-label">Border</div>

        <div class="field-row">
          <label for="borderMode">Mode</label>
          <select id="borderMode">
            <option value="auto">Auto (darken)</option>
            <option value="overlay">Brightness</option>
            <option value="manual">Manual Colors</option>
          </select>
        </div>

        <div class="field-row" id="overlayControls" style="display:none;">
          <label for="borderBrightness">Brightness</label>
          <input type="range" id="borderBrightness" min="0" max="2" step="0.05" value="0.5">
          <span id="borderBrightnessLabel" class="value-badge">0.5</span>
        </div>

        <div class="field-row" id="manualBorderControls" style="display:none;">
          <label>Border Colors</label>
          <div class="color-pair">
            <input type="color" id="borderColor1" value="#000000">
            <span class="color-arrow">→</span>
            <input type="color" id="borderColor2" value="#000000">
          </div>
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="field-row btn-row">
        <button id="download">⬇ Download PNG</button>
        <button id="shareBtn">🔗 Copy Link</button>
      </div>

    </div>
  </main>

  <footer>
    NOT AN OFFICIAL MINECRAFT PRODUCT. NOT APPROVED BY OR ASSOCIATED WITH MOJANG OR MICROSOFT.<br>
    MADE BY TRTLDEV, WITH LOVE, I GUESS &lt;3
  </footer>
</body>
</html>
